
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner Pro</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    select, button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
      border-radius: 6px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }

    #history {
      margin-top: 20px;
      text-align: left;
      max-width: 350px;
      margin: auto;
      background: white;
      padding: 10px;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .item {
      padding: 5px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>📦 QR Scanner Pro</h2>

<div id="reader"></div>

<select id="cameraSelect"></select>

<div>
  <button onclick="startScanner()">Start</button>
  <button onclick="stopScanner()">Stop</button>
</div>

<div id="status">Loading cameras...</div>

<div id="history">
  <strong>Scan History:</strong>
  <div id="list"></div>
</div>

<!-- Beep Sound -->
<audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" preload="auto"></audio>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbynjGl0M3EyYO4E1uJebiY3RipZb4Pz2B40beM8RIo1vnTc6aX7x1PkAuzXED1cBwFU/exec";

let html5QrCode;
let cameras = [];
let isCoolingDown = false;
let cooldownTimer = null;

const beep = document.getElementById("beep");

// Load Cameras
async function loadCameras() {
  try {
    await navigator.mediaDevices.getUserMedia({ video: true });

    cameras = await Html5Qrcode.getCameras();

    const select = document.getElementById("cameraSelect");
    select.innerHTML = "";

    cameras.forEach((cam, index) => {
      const option = document.createElement("option");
      option.value = cam.id;
      option.text = cam.label || "Camera " + (index + 1);
      select.appendChild(option);
    });

    // Auto-select back camera
    const backCam = cameras.find(cam => cam.label.toLowerCase().includes("back"));
    if (backCam) select.value = backCam.id;

    document.getElementById("status").innerText = "Select camera and start";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Camera permission denied ❌";
  }
}

// Start Scanner
async function startScanner() {
  try {
    // 🔊 Unlock audio (required for mobile browsers)
    await beep.play().then(() => {
      beep.pause();
      beep.currentTime = 0;
    }).catch(()=>{});

    const cameraId = document.getElementById("cameraSelect").value;

    if (!cameraId) {
      alert("Please select a camera");
      return;
    }

    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    document.getElementById("status").innerText = "Scanning...";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Start failed ❌";
  }
}

// On Scan
function onScanSuccess(decodedText) {

  // 🚫 Block during cooldown
  if (isCoolingDown) return;

  isCoolingDown = true;

  // 🔊 Play sound
  beep.currentTime = 0;
  beep.play().catch(() => {});

  // 📳 Optional vibration (Android)
  if (navigator.vibrate) {
    navigator.vibrate(200);
  }

  document.getElementById("status").innerText = "Saving...";

  addToHistory(decodedText);

  // Send to Apps Script
  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ qrData: decodedText }),
    headers: {
      "Content-Type": "application/json"
    }
  });

  // ⏳ Countdown
  let count = 5;
  document.getElementById("status").innerText = `Next scan in ${count}...`;

  cooldownTimer = setInterval(() => {
    count--;

    if (count > 0) {
      document.getElementById("status").innerText = `Next scan in ${count}...`;
    } else {
      clearInterval(cooldownTimer);
      document.getElementById("status").innerText = "GO ✅";
      isCoolingDown = false;
    }
  }, 1000);
}

// Stop Scanner
async function stopScanner() {
  try {
    if (html5QrCode) {
      await html5QrCode.stop();
      await html5QrCode.clear();
      document.getElementById("status").innerText = "Stopped";
    }
  } catch (err) {
    console.error(err);
  }
}

// Add to History
function addToHistory(data) {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = new Date().toLocaleTimeString() + " - " + data;

  document.getElementById("list").prepend(div);
}

// Init
loadCameras();
</script>

</body>
</html>
