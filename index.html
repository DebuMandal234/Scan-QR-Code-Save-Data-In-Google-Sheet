<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner Pro</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
    }

    #history {
      margin-top: 20px;
      text-align: left;
      max-width: 350px;
      margin-left: auto;
      margin-right: auto;
      background: white;
      padding: 10px;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .item {
      padding: 5px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2>QR Scanner Pro</h2>

<div id="reader"></div>

<div>
  <button onclick="startScanner()">Start</button>
  <button onclick="stopScanner()">Stop</button>
  <button onclick="switchCamera()">Switch Camera</button>
</div>

<div id="status">Ready</div>

<div id="history">
  <strong>Scan History:</strong>
  <div id="list"></div>
</div>

<!-- Beep Sound -->
<audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbynjGl0M3EyYO4E1uJebiY3RipZb4Pz2B40beM8RIo1vnTc6aX7x1PkAuzXED1cBwFU/exec";

let html5QrCode;
let cameraId = null;
let cameras = [];
let currentCameraIndex = 0;
let scannedSet = new Set(); // prevent duplicates

// Start Scanner
async function startScanner() {
  document.getElementById("status").innerText = "Starting camera...";

  try {
    await navigator.mediaDevices.getUserMedia({ video: true });

    cameras = await Html5Qrcode.getCameras();

    if (cameras.length === 0) {
      document.getElementById("status").innerText = "No camera found ❌";
      return;
    }

    cameraId = cameras[currentCameraIndex].id;

    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    document.getElementById("status").innerText = "Scanning...";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Camera error ❌";
  }
}

// On Scan
function onScanSuccess(decodedText) {

  if (scannedSet.has(decodedText)) return; // prevent duplicate

  scannedSet.add(decodedText);

  document.getElementById("beep").play();

  document.getElementById("status").innerText = "Saving...";

  addToHistory(decodedText);

  // Send to Apps Script
  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ qrData: decodedText }),
    headers: {
      "Content-Type": "application/json"
    }
  });

  setTimeout(() => {
    document.getElementById("status").innerText = "Saved ✅";
  }, 500);
}

// Stop Scanner
async function stopScanner() {
  try {
    if (html5QrCode) {
      await html5QrCode.stop();
      await html5QrCode.clear();
      document.getElementById("status").innerText = "Stopped";
    }
  } catch (err) {
    console.error(err);
  }
}


  
async function switchCamera() {
  if (!cameras.length) return;

  document.getElementById("status").innerText = "Switching camera...";

  try {
    if (html5QrCode) {
      await html5QrCode.stop();   // ✅ wait properly
      await html5QrCode.clear();  // ✅ fully release camera
    }

    // change camera index
    currentCameraIndex = (currentCameraIndex + 1) % cameras.length;
    cameraId = cameras[currentCameraIndex].id;

    // restart with new camera
    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

    document.getElementById("status").innerText = "Camera switched ✅";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Camera switch failed ❌";
  }
}

// Add to history UI
function addToHistory(data) {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = new Date().toLocaleTimeString() + " - " + data;

  document.getElementById("list").prepend(div);
}
</script>

</body>
</html>
