<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scanner</title>

  <!-- html5-qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #status {
      margin-top: 10px;
      color: blue;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>QR Code Scanner</h2>

<div id="reader"></div>

<button onclick="startScanner()">Start Scan</button>
<button onclick="stopScanner()">Stop</button>

<div id="status">Ready</div>
<div id="result"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbynjGl0M3EyYO4E1uJebiY3RipZb4Pz2B40beM8RIo1vnTc6aX7x1PkAuzXED1cBwFU/exec";

let html5QrCode;
let isScanning = false;

// Start Scanner
function startScanner() {
  if (isScanning) return;

  html5QrCode = new Html5Qrcode("reader");

  document.getElementById("status").innerText = "Requesting camera...";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(() => {
      document.getElementById("status").innerText = "Camera ready ✅";

      Html5Qrcode.getCameras().then(devices => {
        if (devices.length) {
          isScanning = true;

          html5QrCode.start(
            devices[0].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess
          );
        } else {
          document.getElementById("status").innerText = "No camera found ❌";
        }
      });
    })
    .catch(err => {
      console.error(err);
      document.getElementById("status").innerText = "Camera permission denied ❌";
    });
}

// When QR is scanned
function onScanSuccess(decodedText) {
  document.getElementById("result").innerText = "Scanned: " + decodedText;

  document.getElementById("status").innerText = "Saving...";

  // Send to Apps Script
  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({ qrData: decodedText }),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(() => {
    // Simulate success (no-cors doesn't allow reading response)
    setTimeout(() => {
      document.getElementById("status").innerText = "Saved to Google Sheet ✅";
    }, 500);
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").innerText = "Error saving data ❌";
  });

  stopScanner(); // auto stop after scan
}

// Stop Scanner
function stopScanner() {
  if (html5QrCode && isScanning) {
    html5QrCode.stop().then(() => {
      isScanning = false;
      document.getElementById("status").innerText = "Scanner stopped";
    }).catch(err => console.error(err));
  }
}
</script>

</body>
</html>
